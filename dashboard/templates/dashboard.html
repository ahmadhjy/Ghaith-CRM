<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — Ghaith CRM</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="req-wrap">
    <header class="req-hero">
        <div class="req-hero__bg"></div>
        <div class="req-hero__content">
            <div class="req-hero__eyebrow">Home</div>
            <h1 class="req-hero__title">Dashboard</h1>
            <p class="req-hero__sub">Quick access to calendar and payment tracking.</p>
        </div>
    </header>

    <div class="req-stats">
        <a href="{% url 'calendar' %}" class="req-stat" style="text-decoration:none;color:inherit">
            <span class="req-stat__label">Calendar</span>
            <span class="req-stat__value"><i class="fas fa-calendar-alt"></i></span>
        </a>
        <a href="{% url 'supplier_payments_list' %}" class="req-stat" style="text-decoration:none;color:inherit">
            <span class="req-stat__label">Supplier Payments</span>
            <span class="req-stat__value"><i class="fas fa-truck"></i></span>
        </a>
        <a href="{% url 'client_payments_list' %}" class="req-stat" style="text-decoration:none;color:inherit">
            <span class="req-stat__label">Client Payments</span>
            <span class="req-stat__value"><i class="fas fa-money-check-alt"></i></span>
        </a>
    </div>
</div>
</body>
</html>
