<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'shared/app_head.html' %}
    <title>Login — Ghaith CRM</title>
</head>
<body class="login-page">
    {% load static %}
    <div class="login-wrap">
        <img src="{% static 'images/logo.png' %}" alt="Ghaith Travel" class="logo">
        <h1 style="margin:0 0 6px;font-size:1.35rem;font-weight:800">Ghaith CRM</h1>
        <p style="margin:0 0 24px;color:var(--req-muted);font-size:.9rem">Sign in to continue</p>
        <form method="post" class="login-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-button"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
    </div>
</body>
</html>
