<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Daily Report — Ghaith CRM</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="req-wrap">
    <header class="req-hero">
        <div class="req-hero__bg"></div>
        <div class="req-hero__content">
            <div class="req-hero__eyebrow">Reports</div>
            <h1 class="req-hero__title">Daily Report</h1>
            <p class="req-hero__sub">Submit today's activity summary.</p>
        </div>
    </header>

    <div class="req-card">
        <form method="post">
            {% csrf_token %}
            <div class="req-card__body">
                <div class="req-grid req-grid--2">
                    <div class="req-field">
                        <label>Name</label>
                        <input type="text" class="form-control" value="{{ username }}" readonly>
                    </div>
                    <div class="req-field">
                        <label>Date</label>
                        <input type="text" class="form-control" value="{{ today }}" readonly>
                    </div>
                    <div class="req-field">
                        <label>Took Over Today</label>
                        <input type="text" class="form-control" value="{{ took_over_leads_today }}" readonly>
                    </div>
                    <div class="req-field">
                        <label>Unqualified Leads</label>
                        <input type="text" class="form-control" value="{{ unqualified_leads_count }}" readonly>
                    </div>
                    <div class="req-field">
                        <label>Follow Ups</label>
                        <input type="text" class="form-control" value="{{ modified_leads_today }}" readonly>
                    </div>
                    <div class="req-field req-field--full">
                        <label for="id_notes">Notes</label>
                        {{ form.notes }}
                    </div>
                </div>
            </div>
            <div class="req-card__foot">
                <button type="submit" class="req-btn req-btn--primary"><i class="fas fa-paper-plane"></i> Submit Report</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
