<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reports — Ghaith CRM</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="req-wrap">
    <header class="req-hero">
        <div class="req-hero__bg"></div>
        <div class="req-hero__content">
            <div class="req-hero__eyebrow">Reports</div>
            <h1 class="req-hero__title">Daily Reports</h1>
            <p class="req-hero__sub">Team daily activity summaries.</p>
            <div class="req-hero__footer">
                <a href="{% url 'daily_report' %}" class="req-btn-ghost"><i class="fas fa-plus"></i> New Report</a>
            </div>
        </div>
    </header>

    <div class="req-card">
        <div class="req-filters">
            <form method="get">
                <div class="req-filter-group">
                    <span class="req-filter-label">Date</span>
                    <input type="date" name="date" class="req-input" value="{{ date_filter }}">
                </div>
                <button type="submit" class="req-btn req-btn--primary req-btn--sm">Filter</button>
            </form>
        </div>
        <div class="req-table-wrap">
            <table class="req-table table">
                <thead><tr><th>Date</th><th>User</th><th>View</th></tr></thead>
                <tbody>
                    {% for report in reports %}
                    <tr>
                        <td data-label="Date">{{ report.created_at }}</td>
                        <td data-label="User">{{ report.user.username }}</td>
                        <td data-label="View"><a href="{% url 'view_daily_report' report.pk %}" class="req-btn req-btn--outline req-btn--sm">Open</a></td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3"><div class="req-empty"><i class="fas fa-file-alt"></i>No reports found.</div></td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
