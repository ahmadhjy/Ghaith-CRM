<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Attachment</title>
    <meta charset="UTF-8">
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="{% static 'css/attach.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/display-modern.css' %}">
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container">
      <div class="content">
        <h2>Add Attachment</h2>
        <form method="post" enctype="multipart/form-data" class="attachment-form">
          {% csrf_token %}
          {{ form.as_p }}
          <input type="submit" value="Submit" class="submit-button">
        </form>
      </div>
    </div>
</body>
</html>
