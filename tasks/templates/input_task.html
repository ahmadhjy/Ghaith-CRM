<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Task — Ghaith CRM</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="req-wrap">
    <header class="req-hero">
        <div class="req-hero__bg"></div>
        <div class="req-hero__content">
            <div class="req-hero__eyebrow">Tasks</div>
            <h1 class="req-hero__title">New Task</h1>
            <p class="req-hero__sub">Create a task and assign it to a team member.</p>
            <div class="req-hero__footer">
                <a href="{% url 'current tasks' %}" class="req-btn-ghost"><i class="fas fa-arrow-left"></i> My Tasks</a>
            </div>
        </div>
    </header>

    <div class="req-card">
        <form method="post" id="inputForm">
            {% csrf_token %}
            <div class="req-card__body">
                <div class="req-grid req-grid--2">
                    <div class="req-field">
                        <label for="id_status">Status</label>
                        {{ form.status }}
                    </div>
                    <div class="req-field">
                        <label for="id_title">Task Title</label>
                        {{ form.title }}
                    </div>
                    <div class="req-field req-field--full">
                        <label for="id_details">Details</label>
                        {{ form.details }}
                    </div>
                    <div class="req-field">
                        <label for="id_due_time">Due Time</label>
                        {{ form.due_time }}
                    </div>
                    <div class="req-field">
                        <label for="id_tag">Department</label>
                        {{ form.tag }}
                    </div>
                    <div class="req-field">
                        <label for="id_assigned_to">Assigned To</label>
                        {{ form.assigned_to }}
                    </div>
                </div>
            </div>
            <div class="req-card__foot">
                <button type="submit" class="req-btn req-btn--primary"><i class="fas fa-save"></i> Save Task</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
