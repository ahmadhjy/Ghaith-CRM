<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Attachment — Ghaith CRM</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="req-wrap">
    <header class="req-hero">
        <div class="req-hero__bg"></div>
        <div class="req-hero__content">
            <div class="req-hero__eyebrow">Orders</div>
            <h1 class="req-hero__title">Add Invoice Attachment</h1>
            <p class="req-hero__sub">Upload a file to this lead task / invoice.</p>
        </div>
    </header>

    <div class="req-card">
        <form method="post" enctype="multipart/form-data" class="attachment-form">
            {% csrf_token %}
            <div class="req-card__body">
                <div class="req-grid">
                    {% for field in form %}
                    <div class="req-field">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="req-card__foot">
                <button type="submit" class="req-btn req-btn--accent"><i class="fas fa-upload"></i> Upload</button>
                <button type="button" class="req-btn req-btn--outline" onclick="history.back()">Cancel</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
